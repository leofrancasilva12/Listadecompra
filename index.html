<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Lista de Compras</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --red:#EA1D2C; --red-dark:#C0121F; --red-light:#FFF0F1;
    --green:#3AB77B; --blue:#2563EB;
    --gray-1:#F7F7F7; --gray-2:#EFEFEF; --gray-3:#D0D0D0;
    --gray-4:#9E9E9E; --gray-5:#616161; --gray-6:#212121;
    --shadow-sm:0 1px 4px rgba(0,0,0,0.08);
    --shadow-md:0 4px 16px rgba(0,0,0,0.12);
    --r:16px; --r-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Nunito',sans-serif;background:var(--gray-1);color:var(--gray-6);min-height:100vh;max-width:480px;margin:0 auto}

  /* HEADER */
  .header{background:var(--red);padding:16px 16px 22px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(234,29,44,.3)}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .header-left{display:flex;align-items:center;gap:8px}
  .header h1{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.5px}
  .header h1 span{opacity:.7;font-weight:700}
  .list-badge{background:rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:99px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .header-actions{display:flex;gap:6px}
  .btn-icon{background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
  .btn-icon:hover{background:rgba(255,255,255,.28)}
  .search-wrap{position:relative}
  .search-wrap input{width:100%;padding:11px 16px 11px 42px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;background:rgba(255,255,255,.95);color:var(--gray-6);outline:none;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .search-wrap input::placeholder{color:var(--gray-4);font-weight:600}
  .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none}

  /* DRAWER */
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
  .drawer-overlay.open{opacity:1;pointer-events:all}
  .drawer{position:fixed;top:0;left:50%;transform:translateX(-50%) translateX(520px);width:100%;max-width:480px;height:100%;background:#fff;z-index:400;display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(0,0,0,.2)}
  .drawer.open{transform:translateX(-50%) translateX(0)}
  .drawer-hd{background:var(--red);padding:20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .drawer-hd h2{font-size:18px;font-weight:900;color:#fff}
  .drawer-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .drawer-close:hover{background:rgba(255,255,255,.35)}
  .drawer-new{padding:14px 16px;border-bottom:1px solid var(--gray-2);flex-shrink:0}
  .drawer-new label{font-size:11px;font-weight:800;color:var(--gray-5);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:8px}
  .drawer-new-row{display:flex;gap:8px}
  .input-new-list{flex:1;padding:11px 13px;border:2px solid var(--gray-2);border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--gray-6);outline:none;transition:border-color .2s}
  .input-new-list:focus{border-color:var(--red)}
  .input-new-list::placeholder{color:var(--gray-3);font-weight:600}
  .btn-create{background:var(--red);color:#fff;border:none;padding:11px 16px;border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;transition:background .2s}
  .btn-create:hover{background:var(--red-dark)}
  .drawer-body{flex:1;overflow-y:auto;padding:12px 14px}
  .drawer-empty{text-align:center;padding:40px 20px;color:var(--gray-4)}
  .drawer-empty span{font-size:48px;display:block;margin-bottom:12px}
  .drawer-empty p{font-size:14px;font-weight:600;line-height:1.5}
  .lcard{background:var(--gray-1);border-radius:var(--r-sm);padding:13px;margin-bottom:8px;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;gap:11px;transition:all .18s;animation:listIn .2s ease}
  .lcard:hover{background:var(--red-light);border-color:#FFCCD0}
  .lcard.act{background:var(--red-light);border-color:var(--red)}
  .lcard-ico{font-size:28px;flex-shrink:0}
  .lcard-info{flex:1;min-width:0}
  .lcard-name{font-size:15px;font-weight:800;color:var(--gray-6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lcard.act .lcard-name{color:var(--red)}
  .lcard-meta{font-size:12px;color:var(--gray-4);font-weight:600;margin-top:2px}
  .act-badge{font-size:10px;font-weight:800;color:var(--red);background:#fff;border:1.5px solid var(--red);padding:2px 8px;border-radius:99px;flex-shrink:0}
  .lcard-del{background:transparent;border:none;color:var(--gray-3);font-size:17px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:all .15s;flex-shrink:0}
  .lcard-del:hover{background:#FFE8EA;color:var(--red)}

  /* STATS */
  .stats-bar{background:#fff;padding:12px 16px;display:flex;gap:14px;align-items:center;border-bottom:1px solid var(--gray-2);overflow-x:auto;scrollbar-width:none}
  .stats-bar::-webkit-scrollbar{display:none}
  .stat{display:flex;align-items:center;gap:5px;white-space:nowrap}
  .stat-num{font-size:18px;font-weight:900;color:var(--red)}
  .stat-label{font-size:11px;color:var(--gray-4);font-weight:700}
  .stat-div{width:1px;height:22px;background:var(--gray-2);flex-shrink:0}
  .progress-wrap{flex:1;min-width:80px}
  .progress-bar{height:6px;background:var(--gray-2);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#5CE69A);border-radius:99px;transition:width .4s ease}
  .progress-label{font-size:11px;color:var(--gray-4);font-weight:700;margin-top:3px}

  /* ADD FORM */
  .add-section{background:#fff;margin:10px 10px 0;border-radius:var(--r);padding:14px;box-shadow:var(--shadow-sm)}
  .add-section-title{font-size:12px;font-weight:800;color:var(--gray-5);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
  .add-row{display:flex;gap:7px;position:relative}
  .input-item{flex:1;padding:11px 13px;border:2px solid var(--gray-2);border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:var(--gray-6);outline:none;transition:border-color .2s}
  .input-item:focus{border-color:var(--red)}
  .input-item::placeholder{color:var(--gray-3)}

  /* SMART HINT — aparece abaixo do input */
  .smart-hint{
    display:none;
    margin-top:8px;
    background:var(--gray-1);
    border:1.5px solid var(--gray-2);
    border-radius:var(--r-sm);
    padding:10px 13px;
    gap:10px;
    align-items:center;
    animation:fadeIn .18s ease;
  }
  .smart-hint.show{display:flex}
  .hint-ico{font-size:22px;flex-shrink:0}
  .hint-body{flex:1;min-width:0}
  .hint-cat{font-size:12px;font-weight:800;color:var(--gray-5);text-transform:uppercase;letter-spacing:.3px}
  .hint-unit{font-size:13px;font-weight:700;color:var(--gray-6);margin-top:1px}
  .hint-unit span{color:var(--red);font-weight:900}
  .hint-change{font-size:12px;color:var(--blue);font-weight:800;cursor:pointer;white-space:nowrap;text-decoration:underline;text-underline-offset:2px;flex-shrink:0}

  /* Manual overrides row */
  .manual-row{display:none;gap:7px;margin-top:8px;animation:fadeIn .18s ease}
  .manual-row.show{display:flex}
  .select-cat-manual{flex:1;padding:9px 10px;border:2px solid var(--gray-2);border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--gray-6);background:#fff;cursor:pointer;outline:none;appearance:none;transition:border-color .2s}
  .select-cat-manual:focus{border-color:var(--red)}
  .select-unit-manual{padding:9px 10px;border:2px solid var(--gray-2);border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--gray-6);background:#fff;cursor:pointer;outline:none;appearance:none;transition:border-color .2s;min-width:82px}
  .select-unit-manual:focus{border-color:var(--red)}
  .btn-add{background:var(--red);color:#fff;border:none;border-radius:var(--r-sm);width:46px;font-size:24px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .1s;align-self:flex-start}
  .btn-add:hover{background:var(--red-dark)}
  .btn-add:active{transform:scale(.95)}

  /* CAT FILTER */
  .cat-filter{padding:10px 10px 0;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
  .cat-filter::-webkit-scrollbar{display:none}
  .cat-chip{display:flex;align-items:center;gap:4px;padding:6px 13px;border-radius:99px;border:2px solid var(--gray-2);background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--gray-5);white-space:nowrap;transition:all .18s;user-select:none}
  .cat-chip.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 8px rgba(234,29,44,.3)}

  /* LIST AREA */
  .list-area{padding:10px;padding-bottom:155px}
  .cat-group{margin-bottom:8px}
  .cat-group-hd{display:flex;align-items:center;gap:8px;padding:10px 4px 6px}
  .cg-emoji{font-size:19px}
  .cg-name{font-size:13px;font-weight:800;color:var(--gray-5);text-transform:uppercase;letter-spacing:.4px;flex:1}
  .cg-count{font-size:12px;font-weight:700;color:var(--gray-4);background:var(--gray-2);padding:2px 8px;border-radius:99px}
  .item-card{background:#fff;border-radius:var(--r-sm);display:flex;align-items:center;gap:11px;padding:11px 13px;margin-bottom:6px;box-shadow:var(--shadow-sm);transition:all .25s;position:relative;overflow:hidden;animation:slideIn .22s ease}
  .item-card.checked{opacity:.55;background:var(--gray-1)}
  .item-card.checked::after{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:4px;height:80%;background:var(--green);border-radius:0 4px 4px 0}
  .item-chk{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--gray-3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;background:#fff}
  .item-chk.checked{background:var(--green);border-color:var(--green);color:#fff;font-size:14px}
  .item-info{flex:1;min-width:0}
  .item-name{font-size:15px;font-weight:700;color:var(--gray-6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item-card.checked .item-name{text-decoration:line-through;color:var(--gray-4)}
  .item-badge{font-size:11px;font-weight:700;color:var(--gray-4);margin-top:2px}

  /* QTY CTRL — adaptado para kg/un/l */
  .qty-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
  .qty-ctrl{display:flex;align-items:center;border:2px solid var(--gray-2);border-radius:10px;overflow:hidden}
  .qty-btn{width:30px;height:30px;border:none;background:#fff;font-size:17px;font-weight:900;color:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .qty-btn:hover{background:var(--red-light)}
  .qty-num{min-width:36px;text-align:center;font-size:13px;font-weight:800;color:var(--gray-6)}
  .qty-unit-label{font-size:10px;font-weight:800;color:var(--gray-4);text-transform:uppercase;letter-spacing:.3px}

  .item-del{width:28px;height:28px;border:none;background:transparent;color:var(--gray-3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .15s;flex-shrink:0}
  .item-del:hover{background:#FFE8EA;color:var(--red)}

  .empty{text-align:center;padding:50px 20px;color:var(--gray-4)}
  .empty-ico{font-size:60px;display:block;margin-bottom:14px}
  .empty h3{font-size:19px;font-weight:800;color:var(--gray-5);margin-bottom:8px}
  .empty p{font-size:14px;font-weight:600;line-height:1.5}

  /* BOTTOM BAR */
  .bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;padding:10px 14px 22px;box-shadow:0 -4px 24px rgba(0,0,0,.1);border-top:1px solid var(--gray-2);display:flex;flex-direction:column;gap:7px;z-index:200}
  .bottom-info{display:flex;justify-content:space-between;align-items:center}
  .bottom-total{font-size:13px;color:var(--gray-4);font-weight:700}
  .bottom-checked{font-size:13px;color:var(--green);font-weight:800}
  .bottom-btns{display:flex;gap:8px}
  .btn-save{flex:1;background:var(--blue);color:#fff;border:none;padding:14px;border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;box-shadow:0 4px 14px rgba(37,99,235,.3)}
  .btn-save:hover{background:#1D4ED8;transform:translateY(-1px)}
  .btn-save:active{transform:translateY(0)}
  .btn-whats{flex:1.4;background:#25D366;color:#fff;border:none;padding:14px;border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;box-shadow:0 4px 14px rgba(37,211,102,.3)}
  .btn-whats:hover{background:#1ebe5d;transform:translateY(-1px)}
  .btn-whats:active{transform:translateY(0)}
  .btn-save:disabled,.btn-whats:disabled{background:var(--gray-3);box-shadow:none;cursor:not-allowed;transform:none}
  .btn-whats svg{width:20px;height:20px;flex-shrink:0}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:#fff;border-radius:20px;padding:26px 22px;width:100%;max-width:360px;box-shadow:var(--shadow-md);transform:scale(.92);transition:transform .22s}
  .modal-overlay.open .modal{transform:scale(1)}
  .modal h3{font-size:18px;font-weight:900;color:var(--gray-6);margin-bottom:5px}
  .modal p{font-size:14px;color:var(--gray-4);font-weight:600;margin-bottom:18px}
  .modal input{width:100%;padding:12px 14px;border:2px solid var(--gray-2);border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--gray-6);outline:none;transition:border-color .2s;margin-bottom:16px}
  .modal input:focus{border-color:var(--red)}
  .modal-btns{display:flex;gap:8px}
  .btn-mc{flex:1;padding:12px;border-radius:var(--r-sm);border:2px solid var(--gray-2);background:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--gray-5);cursor:pointer;transition:all .15s}
  .btn-mc:hover{background:var(--gray-1)}
  .btn-mo{flex:1;padding:12px;border-radius:var(--r-sm);border:none;background:var(--red);color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .15s}
  .btn-mo:hover{background:var(--red-dark)}

  /* TOAST */
  .toast{position:fixed;top:74px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--gray-6);color:#fff;padding:10px 20px;border-radius:99px;font-size:14px;font-weight:700;opacity:0;transition:all .28s;z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @keyframes slideIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes listIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- DRAWER: MINHAS LISTAS -->
<div class="drawer" id="drawer">
  <div class="drawer-hd">
    <h2>📋 Minhas Listas</h2>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-new">
    <label>Criar nova lista vazia</label>
    <div class="drawer-new-row">
      <input class="input-new-list" id="newListInput" type="text" placeholder="Ex: Churrasco, Semana..." maxlength="40"
        onkeydown="if(event.key==='Enter') createEmptyList()"/>
      <button class="btn-create" onclick="createEmptyList()">+ Criar</button>
    </div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div class="header-left">
      <h1>🛒 <span>Lista</span></h1>
      <div class="list-badge" id="listBadge">sem nome</div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="openDrawer()" title="Minhas listas">☰</button>
      <button class="btn-icon" onclick="clearAll()" title="Limpar">🗑</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="Buscar item..." oninput="renderList()"/>
  </div>
</header>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat"><span class="stat-num" id="totalCount">0</span><span class="stat-label">ITENS</span></div>
  <div class="stat-div"></div>
  <div class="stat"><span class="stat-num" id="checkedCount" style="color:var(--green)">0</span><span class="stat-label">COMPRADOS</span></div>
  <div class="stat-div"></div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0% concluído</div>
  </div>
</div>

<!-- ADD FORM -->
<div class="add-section">
  <div class="add-section-title">Adicionar item</div>
  <div class="add-row">
    <input class="input-item" id="itemInput" type="text" placeholder="Digite o produto..." maxlength="60"
      oninput="onItemInput()" onkeydown="if(event.key==='Enter') addItem()"/>
    <button class="btn-add" onclick="addItem()">+</button>
  </div>

  <!-- Smart hint: mostra categoria e unidade detectadas -->
  <div class="smart-hint" id="smartHint">
    <div class="hint-ico" id="hintIco">🛍️</div>
    <div class="hint-body">
      <div class="hint-cat" id="hintCat">Outros</div>
      <div class="hint-unit">Unidade: <span id="hintUnit">un</span></div>
    </div>
    <span class="hint-change" onclick="toggleManual()">✏️ Alterar</span>
  </div>

  <!-- Manual override (oculto por padrão) -->
  <div class="manual-row" id="manualRow">
    <select class="select-cat-manual" id="selCatManual">
      <option value="frutas">🍎 Frutas</option>
      <option value="verduras">🥦 Verduras</option>
      <option value="carnes">🥩 Carnes</option>
      <option value="laticinios">🧀 Laticínios</option>
      <option value="padaria">🍞 Padaria</option>
      <option value="bebidas">🥤 Bebidas</option>
      <option value="limpeza">🧹 Limpeza</option>
      <option value="higiene">🧴 Higiene</option>
      <option value="graos">🌾 Grãos</option>
      <option value="congelados">❄️ Congelados</option>
      <option value="outros">🛍️ Outros</option>
    </select>
    <select class="select-unit-manual" id="selUnitManual">
      <option value="un">📦 un</option>
      <option value="kg">⚖️ kg</option>
      <option value="g">⚖️ g</option>
      <option value="L">🥤 L</option>
      <option value="ml">🥤 ml</option>
      <option value="dz">🥚 dz</option>
      <option value="pct">📦 pct</option>
      <option value="cx">📦 cx</option>
    </select>
  </div>
</div>

<!-- CATEGORY FILTER -->
<div class="cat-filter">
  <div class="cat-chip active" onclick="setFilter('all',this)"><span>🛒</span><span>Todos</span></div>
  <div class="cat-chip" onclick="setFilter('frutas',this)"><span>🍎</span><span>Frutas</span></div>
  <div class="cat-chip" onclick="setFilter('verduras',this)"><span>🥦</span><span>Verduras</span></div>

  carnes:    {emoji:'🥩',label:'Carnes'},

};

const UNIT_LABELS = {
  un:'unidade', kg:'kg', g:'gramas', L:'litro', ml:'ml', dz:'dúzia', pct:'pacote', cx:'caixa'
};
const EMOJIS = ['🛒','🍖','🥗','🧃','🧹','🎉','🏠','🥩','🛍️','🍳','🌿','🧺'];

/* ══ ESTADO ══ */
let savedLists = JSON.parse(localStorage.getItem('lc_lists')||'[]');
let items      = JSON.parse(localStorage.getItem('lc_items')||'[]');
let currentId  = localStorage.getItem('lc_cid')||null;
let filter     = 'all';
let manualOpen = false;

/* Estado da detecção atual */
let detected = { cat:'outros', unit:'un' };

function saveState(){ localStorage.setItem('lc_items',JSON.stringify(items)); localStorage.setItem('lc_cid',currentId||''); }
function saveLists(){ localStorage.setItem('lc_lists',JSON.stringify(savedLists)); }
function autoSync(){ if(!currentId)return; const l=savedLists.find(l=>l.id===currentId); if(l){l.items=JSON.parse(JSON.stringify(items));l.updatedAt=Date.now();saveLists();} }

/* ══ DETECÇÃO AUTOMÁTICA ══ */
function normalize(s){
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,'')
    .trim();
}

function detect(raw){
  if(!raw.trim()) return null;
  const n = normalize(raw);
  const words = n.split(/\s+/);

  // 1. Tenta palavra exata ou parcial
  for(const word of words){
    if(DICT[word]) return { cat: DICT[word][0], unit: DICT[word][1] };
  }
  // 2. Tenta se qualquer chave do dicionário está contida no input
  const keys = Object.keys(DICT);
  for(const key of keys){
    if(n.includes(key)) return { cat: DICT[key][0], unit: DICT[key][1] };
  }
  // 3. Regras heurísticas de sufixo/contexto
  if(/\b(kg|quilo|kilo|grama)\b/.test(n)) return { cat:'outros', unit:'kg' };
  if(/\b(litro|litros)\b/.test(n)) return { cat:'bebidas', unit:'L' };
  if(/\b(duzia|dúzia)\b/.test(n)) return { cat:'outros', unit:'dz' };
  if(/\b(pacote|pct)\b/.test(n)) return { cat:'outros', unit:'pct' };
  return null;
}

function onItemInput(){
  const val = document.getElementById('itemInput').value;
  const hint = document.getElementById('smartHint');

  if(!val.trim()){ hint.classList.remove('show'); manualOpen=false; document.getElementById('manualRow').classList.remove('show'); return; }

  const result = detect(val);
  if(result){
    detected = result;
  } else {
    detected = { cat:'outros', unit:'un' };
  }

  // Atualiza hint
  const {emoji,label} = CATS[detected.cat]||{emoji:'🛍️',label:'Outros'};
  document.getElementById('hintIco').textContent  = emoji;
  document.getElementById('hintCat').textContent  = label;
  document.getElementById('hintUnit').textContent = UNIT_LABELS[detected.unit]||detected.unit;
  hint.classList.add('show');

  // Sincroniza selects manuais com detecção
  if(!manualOpen){
    document.getElementById('selCatManual').value  = detected.cat;
    document.getElementById('selUnitManual').value = detected.unit;
  }
}

function toggleManual(){
  manualOpen = !manualOpen;
  const row = document.getElementById('manualRow');
  if(manualOpen){
    row.classList.add('show');
    document.getElementById('selCatManual').value  = detected.cat;
    document.getElementById('selUnitManual').value = detected.unit;
  } else {
    row.classList.remove('show');
  }
}

/* ══ ADICIONAR ITEM ══ */
function addItem(){
  const inp  = document.getElementById('itemInput');
  const name = inp.value.trim();
  if(!name){ inp.focus(); return; }

  let cat, unit;
  if(manualOpen){
    cat  = document.getElementById('selCatManual').value;
    unit = document.getElementById('selUnitManual').value;
  } else {
    cat  = detected.cat;
    unit = detected.unit;
  }

  // Quantidade inicial baseada na unidade
  const qty = (unit==='kg'||unit==='g'||unit==='L'||unit==='ml') ? 1 : 1;

  items.push({ id:Date.now(), name, cat, unit, qty, checked:false });
  autoSync(); saveState();
  inp.value = '';
  detected = {cat:'outros',unit:'un'};
  document.getElementById('smartHint').classList.remove('show');
  document.getElementById('manualRow').classList.remove('show');
  manualOpen = false;
  inp.focus();
  renderList();
  const {emoji} = CATS[cat]||{emoji:'🛍️'};
  showToast(`${emoji} ${name} adicionado!`);
}

function removeItem(id){ items=items.filter(i=>i.id!==id); autoSync();saveState();renderList(); }
function toggleCheck(id){ const i=items.find(i=>i.id===id); if(i){i.checked=!i.checked;autoSync();saveState();renderList();} }

function changeQty(id, d){
  const item = items.find(i=>i.id===id);
  if(!item) return;
  const unit = item.unit||'un';
  const step = (unit==='kg') ? 0.5 : (unit==='g') ? 100 : (unit==='L') ? 0.5 : (unit==='ml') ? 250 : 1;
  const min  = (unit==='kg'||unit==='L') ? 0.5 : (unit==='g') ? 100 : (unit==='ml') ? 250 : 1;
  item.qty = Math.max(min, Math.round((item.qty + d*step)*100)/100);
  autoSync();saveState();renderList();
}

function setFilter(cat,el){ filter=cat; document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); renderList(); }
function clearAll(){ if(!items.length)return; if(confirm('Limpar todos os itens?')){items=[];autoSync();saveState();renderList();showToast('🗑️ Lista limpa!');} }

/* ══ DRAWER / LISTAS ══ */
function openDrawer(){ renderDrawer(); document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); document.body.style.overflow=''; }

function renderDrawer(){
  const el = document.getElementById('drawerBody');
  if(!savedLists.length){ el.innerHTML=`<div class="drawer-empty"><span>📋</span><p>Nenhuma lista salva ainda.<br>Salve a lista atual ou crie uma nova!</p></div>`; return; }
  el.innerHTML = savedLists.map(lst=>{
    const isAct = lst.id===currentId;
    const dt = new Date(lst.updatedAt||lst.createdAt).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    const cnt = lst.items.length;
    return `<div class="lcard${isAct?' act':''}" onclick="loadList('${lst.id}')">
      <div class="lcard-ico">${lst.emoji}</div>
      <div class="lcard-info">
        <div class="lcard-name">${esc(lst.name)}</div>
        <div class="lcard-meta">${cnt} ${cnt===1?'item':'itens'} · ${dt}</div>
      </div>
      ${isAct?'<span class="act-badge">ATIVA</span>':''}
      <button class="lcard-del" onclick="event.stopPropagation();deleteList('${lst.id}')">✕</button>
    </div>`;
  }).join('');
}

function createEmptyList(){
  const inp=document.getElementById('newListInput');
  const name=inp.value.trim();
  if(!name){inp.focus();return;}
  const id='l'+Date.now();
  savedLists.unshift({id,name,emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],items:[],createdAt:Date.now(),updatedAt:Date.now()});
  items=[];currentId=id; saveState();saveLists();inp.value='';
  renderDrawer();renderList();updateBadge();
  showToast('📋 Lista "'+name+'" criada!');
}

function loadList(id){
  const lst=savedLists.find(l=>l.id===id); if(!lst)return;
  items=JSON.parse(JSON.stringify(lst.items)); currentId=id;
  saveState();closeDrawer();renderList();updateBadge();
  showToast('📋 "'+lst.name+'" carregada!');
}
function deleteList(id){
  const lst=savedLists.find(l=>l.id===id);
  if(!lst||!confirm('Excluir "'+lst.name+'"?'))return;
  savedLists=savedLists.filter(l=>l.id!==id);
  if(currentId===id){currentId=null;saveState();}
  saveLists();renderDrawer();updateBadge();
  showToast('🗑️ Lista excluída!');
}
function updateBadge(){
  const el=document.getElementById('listBadge');
  if(currentId){const l=savedLists.find(l=>l.id===currentId);el.textContent=l?l.emoji+' '+l.name:'sem nome';}
  else el.textContent='sem nome';
}

/* ══ SAVE MODAL ══ */
function openSaveModal(){
  if(!items.length){showToast('⚠️ Adicione itens primeiro!');return;}
  const cur=currentId?savedLists.find(l=>l.id===currentId):null;
  document.getElementById('saveListName').value=cur?cur.name:'';
  document.getElementById('saveModalDesc').textContent=cur?'Atualize o nome ou salve como está':'Dê um nome para identificar esta lista';
  document.getElementById('saveModal').classList.add('open');
  setTimeout(()=>document.getElementById('saveListName').focus(),200);
}
function closeSaveModal(){ document.getElementById('saveModal').classList.remove('open'); }
document.getElementById('saveModal').addEventListener('click',e=>{if(e.target.id==='saveModal')closeSaveModal();});

function confirmSave(){
  const name=document.getElementById('saveListName').value.trim();
  if(!name){document.getElementById('saveListName').focus();return;}
  if(currentId){
    const lst=savedLists.find(l=>l.id===currentId);
    if(lst){lst.name=name;lst.items=JSON.parse(JSON.stringify(items));lst.updatedAt=Date.now();saveState();saveLists();closeSaveModal();updateBadge();showToast('✅ "'+name+'" atualizada!');return;}
  }
  const id='l'+Date.now();
  savedLists.unshift({id,name,emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],items:JSON.parse(JSON.stringify(items)),createdAt:Date.now(),updatedAt:Date.now()});
  currentId=id; saveState();saveLists();closeSaveModal();updateBadge();
  showToast('✅ "'+name+'" salva!');
}

/* ══ RENDER ══ */
function fmtQty(item){
  const u = item.unit||'un';
  const q = item.qty||1;
  if(u==='kg'||u==='L') return q%1===0 ? q+' '+u : q.toFixed(1)+' '+u;
  if(u==='g'||u==='ml') return q+' '+u;
  if(u==='dz') return q+(q===1?' dz':' dz');
  return q+' '+u;
}

function renderList(){
  const search=document.getElementById('searchInput').value.trim().toLowerCase();
  const area=document.getElementById('listArea');
  const visible=items.filter(i=>(filter==='all'||i.cat===filter)&&(!search||i.name.toLowerCase().includes(search)));

  const total=items.length, ck=items.filter(i=>i.checked).length;
  const pct=total?Math.round((ck/total)*100):0;
  document.getElementById('totalCount').textContent=total;
  document.getElementById('checkedCount').textContent=ck;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=pct+'% concluído';
  document.getElementById('bottomTotal').textContent=total+(total===1?' item':' itens');
  document.getElementById('bottomChecked').textContent=ck>0?'✔ '+ck+' comprado'+(ck>1?'s':''):'';
  document.getElementById('btnWhats').disabled=total===0;
  document.getElementById('btnSave').disabled=total===0;

  if(!visible.length){
    area.innerHTML=`<div class="empty"><span class="empty-ico">${search?'🔍':'🛒'}</span><h3>${search?'Sem resultados':'Lista vazia'}</h3><p>${search?'Tente outro termo.':'Digite um produto acima para começar!'}</p></div>`;
    return;
  }

  const groups={};
  visible.forEach(i=>{ if(!groups[i.cat])groups[i.cat]=[]; groups[i.cat].push(i); });

  area.innerHTML=Object.entries(groups).map(([cat,gi])=>{
    const {emoji,label}=CATS[cat]||{emoji:'🛍️',label:cat};
    const catCk=gi.filter(i=>i.checked).length;
    return `<div class="cat-group">
      <div class="cat-group-hd">
        <span class="cg-emoji">${emoji}</span>
        <span class="cg-name">${label}</span>
        <span class="cg-count">${catCk}/${gi.length}</span>
      </div>
      ${gi.map(item=>{
        const unit=item.unit||'un';
        return `<div class="item-card${item.checked?' checked':''}">
          <div class="item-chk${item.checked?' checked':''}" onclick="toggleCheck(${item.id})">${item.checked?'✓':''}</div>
          <div class="item-info">
            <div class="item-name">${esc(item.name)}</div>
            <div class="item-badge">${emoji} ${label}</div>
          </div>
          <div class="qty-wrap">
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
              <span class="qty-num">${fmtQty(item)}</span>
              <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
            </div>
          </div>
          <button class="item-del" onclick="removeItem(${item.id})">✕</button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

/* ══ WHATSAPP ══ */
function shareWhatsApp(){
  if(!items.length)return;
  const groups={};
  items.forEach(i=>{if(!groups[i.cat])groups[i.cat]=[];groups[i.cat].push(i);});
  const total=items.length,ck=items.filter(i=>i.checked).length;
  const pct=total?Math.round((ck/total)*100):0;
  const cur=currentId?savedLists.find(l=>l.id===currentId):null;
  const listName=cur?cur.name:'Lista de Compras';
  let msg=`🛒 *${listName.toUpperCase()}*\n📅 ${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}\n━━━━━━━━━━━━━━━━━━\n\n`;
  Object.entries(groups).forEach(([cat,gi])=>{
    const {emoji,label}=CATS[cat]||{emoji:'🛍️',label:cat};
    msg+=`${emoji} *${label.toUpperCase()}*\n`;
    gi.forEach(i=>{
      const qty=fmtQty(i);
      msg+=`  ${i.checked?'✅':'☐'} ${i.name} _(${qty})_\n`;
    });
    msg+='\n';
  });
  msg+=`━━━━━━━━━━━━━━━━━━\n📊 *${total} ite${total===1?'m':'ns'}* · ${pct}% concluído`;
  if(ck>0) msg+=` · ✅ ${ck} comprado${ck>1?'s':''}`;
  msg+=`\n\n_Enviado pelo 🛒 Minha Lista_`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

updateBadge();
renderList();
</script>
</body>
</html>
